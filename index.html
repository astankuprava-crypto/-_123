<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>creative_baner</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
}

.top-bar {
    width: 100%;
    height: 4px;
    background: black;
    margin-bottom: 10px;
}

.buttons-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
}

.buttons-row button {
    background: white;
    border: 1px solid black;
    border-radius: 20px;
    padding: 8px 20px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}
.buttons-row button:hover {
    background: black;
    color: white;
}

.container {
    max-width: 600px;
    margin: 20px auto;
    text-align: center;
    position: relative;
}

.brand-title {
    font-size: 30px;
    font-weight: bold;
    margin-bottom: 15px;
}

.page {
    position: absolute;
    width: 100%;
    opacity: 0;
    transform: translateY(10px);
    transition: 0.4s ease;
    pointer-events: none;
}
.page.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid black;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    border-radius: 20px;
    border: 1px solid black;
    background: white;
    cursor: pointer;
}
button:hover {
    background: black;
    color: white;
}

.order-btn {
    background: black;
    color: white;
}

.history-item {
    border: 1px solid black;
    padding: 10px;
    margin: 10px 0;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.history-item button {
    padding: 5px 10px;
    font-size: 12px;
}
</style>
</head>
<body>

<div class="top-bar"></div>

<div class="buttons-row">
    <div id="settingsBtnContainer"></div>
    <button onclick="openSupport()">Поддержка</button>
</div>

<div class="container">

<div id="register" class="page active">
    <h2>Вход / Регистрация</h2>
    <input type="text" id="name" placeholder="Введите имя">
    <input type="tel" id="phone" placeholder="+7XXXXXXXXXX">
    <button onclick="login()">Войти</button>
</div>

<div id="mainContent" class="page">
    <div class="brand-title">creative_baner</div>

    <h2>Выберите товар</h2>

    <select id="product" onchange="changePlaceholder()">
        <option value="Визитка">Визитка</option>
        <option value="Банер">Банер</option>
    </select>

    <textarea id="details" placeholder="Напишите оформление визитки"></textarea>

    <button class="order-btn" onclick="sendOrder()">Заказать</button>
    <br>
    <button onclick="logout()">Выйти</button>
</div>

<div id="supportPage" class="page">
    <h2>Поддержка</h2>
    <p>По вопросам обращайтесь по номеру +7 940 969-40-09</p>
    <button onclick="goBack()">Назад</button>
</div>

<div id="settingsPage" class="page">
    <h2>Настройки</h2>
    <h3>История заказов</h3>
    <div id="history"></div>
    <button onclick="goBack()">Назад</button>
</div>

</div>

<script>
const SUPPORT_NUMBER = "+7 940 969-40-09";

/* =========================
   БОТ ДЛЯ ЗАКАЗОВ
========================= */
const ORDER_BOT_TOKEN = "8203835302:AAHTmQ8nW0EJlk-GtYJMoYjxWgmr-SBQsko";
const ORDER_CHAT_ID = "8431821142";

/* =========================
   БОТ ДЛЯ ОТМЕН
========================= */
const CANCEL_BOT_TOKEN = "8006137964:AAEgxOdwMIDPLVRuJI9N_5j4JK_e31r4raY";
const CANCEL_CHAT_ID = "8431821142";

function showPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    setTimeout(() => {
        document.getElementById(id).classList.add("active");
    }, 50);
}

window.onload = function() {
    if (localStorage.getItem("user")) {
        showPage("mainContent");
        addSettingsButton();
    }
};

function validatePhone(phone) {
    return /^\+7\d{10}$/.test(phone);
}

function login() {
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    if (!name) return alert("Введите имя");
    if (!validatePhone(phone)) return alert("Номер должен быть строго в формате +7XXXXXXXXXX");
    localStorage.setItem("user", JSON.stringify({name, phone}));
    showPage("mainContent");
    addSettingsButton();
}

function logout() {
    localStorage.removeItem("user");
    showPage("register");
    removeSettingsButton();
}

function addSettingsButton() {
    document.getElementById("settingsBtnContainer").innerHTML =
        '<button onclick="openSettings()">Настройки</button>';
}

function removeSettingsButton() {
    document.getElementById("settingsBtnContainer").innerHTML = '';
}

function changePlaceholder() {
    const product = document.getElementById("product").value;
    const textarea = document.getElementById("details");
    textarea.placeholder = product === "Визитка"
        ? "Напишите оформление визитки"
        : "Напишите текст для банера";
}

function sendOrder() {
    const user = JSON.parse(localStorage.getItem("user"));
    const product = document.getElementById("product").value;
    const details = document.getElementById("details").value;
    if (!details.trim()) return alert("Заполните информацию для заказа");

    const order = {
        id: Date.now(),
        product,
        details,
        date: new Date().toLocaleString()
    };

    let history = JSON.parse(localStorage.getItem("history")) || [];
    history.push(order);
    localStorage.setItem("history", JSON.stringify(history));

    const message =
`Новая заявка:
Имя: ${user.name}
Телефон: ${user.phone}
Товар: ${product}
Описание: ${details}`;

    fetch(`https://api.telegram.org/bot${ORDER_BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: ORDER_CHAT_ID,
            text: message
        })
    });

    alert(`Заказ принят! Обратитесь по номеру ${SUPPORT_NUMBER}`);
    document.getElementById("details").value = "";
}

function cancelOrder(orderId) {
    let history = JSON.parse(localStorage.getItem("history")) || [];
    const order = history.find(o => o.id === orderId);
    if (!order) return;

    history = history.filter(o => o.id !== orderId);
    localStorage.setItem("history", JSON.stringify(history));
    loadHistory();

    const user = JSON.parse(localStorage.getItem("user"));

    const message =
`Заказ отменён:
Имя: ${user.name}
Телефон: ${user.phone}
Товар: ${order.product}
Описание: ${order.details}`;

    fetch(`https://api.telegram.org/bot${CANCEL_BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: CANCEL_CHAT_ID,
            text: message
        })
    });

    alert("Заказ отменён!");
}

function openSupport() { showPage("supportPage"); }
function openSettings() { loadHistory(); showPage("settingsPage"); }
function goBack() { showPage("mainContent"); }

function loadHistory() {
    const historyDiv = document.getElementById("history");
    const history = JSON.parse(localStorage.getItem("history")) || [];
    historyDiv.innerHTML = "";

    if (history.length === 0) {
        historyDiv.innerHTML = "<p>Заказов пока нет</p>";
        return;
    }

    history.slice().reverse().forEach(item => {
        const div = document.createElement('div');
        div.className = "history-item";
        div.innerHTML = `
            <div>
                <b>Товар:</b> ${item.product}<br>
                <b>Описание:</b> ${item.details}<br>
                <b>Дата:</b> ${item.date}
            </div>
            <button onclick="cancelOrder(${item.id})">Отменить</button>
        `;
        historyDiv.appendChild(div);
    });
}
</script>

</body>
</html>
