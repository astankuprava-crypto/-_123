<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Neon Text</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #001f3f, #000814);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* Центральный контейнер */
.wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    max-height: 65vh;
    overflow-y: auto;
    padding: 20px;
}

/* Неоновый текст (чуть меньше) */
.neon {
    font-size: 32px; /* уменьшенный размер */
    font-weight: bold;
    animation: neonGlow 1.5s infinite alternate;
}

/* Кнопка */
.btn {
    position: absolute;
    bottom: 35px;
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #00ffff;
    color: #000;
    font-weight: bold;
    box-shadow: 0 0 15px #00ffff;
    transition: 0.3s;
}

.btn:hover {
    box-shadow: 0 0 35px #00ffff;
}

@keyframes neonGlow {
    from {
        text-shadow: 0 0 8px currentColor,
                     0 0 16px currentColor,
                     0 0 32px currentColor;
    }
    to {
        text-shadow: 0 0 18px currentColor,
                     0 0 36px currentColor,
                     0 0 70px currentColor;
    }
}
</style>
</head>

<body>

<div class="wrapper" id="container"></div>
<button class="btn" onclick="createText()">Нажми</button>

<script>
const colorList = ["#ff0000", "#ff00ff", "#00ffff", "#00ff00", "#ffff00", "#ff8800"];

function createText() {
    const container = document.getElementById("container");

    const element = document.createElement("div");
    element.className = "neon";
    element.textContent = "Давид мелканян блядь";

    const random = Math.floor(Math.random() * colorList.length);
    element.style.color = colorList[random];

    container.appendChild(element);
    container.scrollTop = container.scrollHeight;
}
</script>

</body>
</html>
